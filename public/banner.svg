<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" width="1200" height="400">
  <defs>
    <!-- Background grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#000000" stroke-width="0.5" opacity="0.06"/>
    </pattern>

    <!-- Radial fade mask for grid -->
    <radialGradient id="gridFade" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="1"/>
    </radialGradient>
    <mask id="gridMask">
      <rect width="1200" height="400" fill="url(#gridFade)"/>
    </mask>

    <!-- Agent glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle shadow for cards -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/>
    </filter>

    <!-- Line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8e6e2" stop-opacity="0"/>
      <stop offset="30%" stop-color="#e8e6e2" stop-opacity="1"/>
      <stop offset="70%" stop-color="#e8e6e2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e8e6e2" stop-opacity="0"/>
    </linearGradient>

    <!-- Score color gradient -->
    <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="45%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>

    <!-- Connector line fade -->
    <linearGradient id="connLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#111110" stop-opacity="0"/>
      <stop offset="100%" stop-color="#111110" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="connRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#111110" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#111110" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="#fafaf9"/>

  <!-- Grid overlay -->
  <rect width="1200" height="400" fill="url(#grid)" mask="url(#gridMask)"/>

  <!-- ── LEFT SECTION — Branding ─────────────────────────────── -->

  <!-- Wordmark dot -->
  <circle cx="120" cy="175" r="4" fill="#111110"/>

  <!-- ListingLens wordmark -->
  <text x="134" y="181" font-family="'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif"
        font-size="22" font-weight="600" fill="#111110" letter-spacing="-0.5">
    ListingLens
  </text>

  <!-- Tagline -->
  <text x="120" y="210" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="11" fill="#a8a7a3" letter-spacing="0.06em">
    AMAZON LISTING INTELLIGENCE
  </text>

  <!-- Divider -->
  <line x1="120" y1="228" x2="320" y2="228" stroke="#e8e6e2" stroke-width="1"/>

  <!-- Main headline -->
  <text x="120" y="266" font-family="'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif"
        font-size="32" font-weight="700" fill="#111110" letter-spacing="-1">
    Find out exactly
  </text>
  <text x="120" y="302" font-family="'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif"
        font-size="32" font-weight="700" fill="#111110" letter-spacing="-1">
    why your images
  </text>
  <text x="120" y="338" font-family="'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif"
        font-size="32" font-weight="700" fill="#6b6a67" letter-spacing="-1">
    aren't converting.
  </text>

  <!-- ── CENTER SECTION — Pipeline viz ──────────────────────── -->

  <!-- Input pill -->
  <rect x="430" y="48" width="340" height="44" rx="10" fill="white"
        stroke="#e8e6e2" stroke-width="1" filter="url(#shadow)"/>
  <text x="450" y="72" font-family="'SF Mono', 'Fira Code', monospace"
        font-size="12" fill="#a8a7a3">
    amazon.com/dp/B0CHX1W1XY
  </text>
  <rect x="734" y="54" width="26" height="32" rx="6" fill="#111110"/>
  <text x="747" y="74" font-family="'SF Pro Display', -apple-system, sans-serif"
        font-size="14" fill="white" text-anchor="middle">→</text>

  <!-- Connector: input → agents -->
  <line x1="600" y1="92" x2="600" y2="118" stroke="#e8e6e2" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- "4 agents · parallel" label -->
  <text x="600" y="113" font-family="'SF Mono', monospace" font-size="10"
        fill="#a8a7a3" text-anchor="middle" letter-spacing="0.05em">
    4 AGENTS · PARALLEL
  </text>

  <!-- Agent cards row -->
  <!-- Agent 1 — Visual -->
  <rect x="430" y="124" width="148" height="72" rx="10" fill="white"
        stroke="#e8e6e2" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="450" cy="144" r="4" fill="#16a34a"/>
  <text x="462" y="148" font-family="'SF Pro Display', sans-serif"
        font-size="11" font-weight="600" fill="#111110">Visual Auditor</text>
  <text x="450" y="164" font-family="'SF Pro Display', sans-serif"
        font-size="10" fill="#6b6a67">12 CRO levers scored</text>
  <text x="450" y="178" font-family="'SF Pro Display', sans-serif"
        font-size="10" fill="#6b6a67">across 7 images</text>
  <text x="450" y="188" font-family="'SF Mono', monospace"
        font-size="9" fill="#a8a7a3">Claude Vision</text>

  <!-- Agent 2 — Reviews -->
  <rect x="588" y="124" width="148" height="72" rx="10" fill="white"
        stroke="#e8e6e2" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="608" cy="144" r="4" fill="#16a34a"/>
  <text x="620" y="148" font-family="'SF Pro Display', sans-serif"
        font-size="11" font-weight="600" fill="#111110">Review Intel</text>
  <text x="608" y="164" font-family="'SF Pro Display', sans-serif"
        font-size="10" fill="#6b6a67">Purchase triggers</text>
  <text x="608" y="178" font-family="'SF Pro Display', sans-serif"
        font-size="10" fill="#6b6a67">from 100+ reviews</text>
  <text x="608" y="188" font-family="'SF Mono', monospace"
        font-size="9" fill="#a8a7a3">Firecrawl + Claude</text>

  <!-- Agent 3 — AI Search -->
  <rect x="430" y="208" width="148" height="72" rx="10" fill="white"
        stroke="#e8e6e2" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="450" cy="228" r="4" fill="#16a34a"/>
  <text x="462" y="232" font-family="'SF Pro Display', sans-serif"
        font-size="11" font-weight="600" fill="#111110">AI Search</text>
  <text x="450" y="248" font-family="'SF Pro Display', sans-serif"
        font-size="10" fill="#6b6a67">Visibility across</text>
  <text x="450" y="262" font-family="'SF Pro Display', sans-serif"
        font-size="10" fill="#6b6a67">Claude + Gemini</text>
  <text x="450" y="272" font-family="'SF Mono', monospace"
        font-size="9" fill="#a8a7a3">Dual LLM check</text>

  <!-- Agent 4 — Benchmark -->
  <rect x="588" y="208" width="148" height="72" rx="10" fill="white"
        stroke="#e8e6e2" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="608" cy="228" r="4" fill="#16a34a"/>
  <text x="620" y="232" font-family="'SF Pro Display', sans-serif"
        font-size="11" font-weight="600" fill="#111110">Benchmarker</text>
  <text x="608" y="248" font-family="'SF Pro Display', sans-serif"
        font-size="10" fill="#6b6a67">Top 5 competitor</text>
  <text x="608" y="262" font-family="'SF Pro Display', sans-serif"
        font-size="10" fill="#6b6a67">hero images compared</text>
  <text x="608" y="272" font-family="'SF Mono', monospace"
        font-size="9" fill="#a8a7a3">SerpAPI + Vision</text>

  <!-- Connector lines between cards -->
  <line x1="578" y1="160" x2="588" y2="160" stroke="#e8e6e2" stroke-width="1"/>
  <line x1="578" y1="244" x2="588" y2="244" stroke="#e8e6e2" stroke-width="1"/>
  <line x1="504" y1="196" x2="504" y2="208" stroke="#e8e6e2" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="662" y1="196" x2="662" y2="208" stroke="#e8e6e2" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Connector: agents → synthesis -->
  <line x1="600" y1="280" x2="600" y2="306" stroke="#e8e6e2" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Synthesis bar -->
  <rect x="430" y="306" width="306" height="36" rx="8" fill="#111110"/>
  <circle cx="454" cy="324" r="3.5" fill="#16a34a"/>
  <text x="468" y="328" font-family="'SF Pro Display', sans-serif"
        font-size="12" font-weight="500" fill="white">Synthesis · Pixii brief generated</text>

  <!-- Connector: synthesis → output -->
  <line x1="736" y1="324" x2="770" y2="324" stroke="#e8e6e2" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ── RIGHT SECTION — Score output ───────────────────────── -->

  <!-- Score card -->
  <rect x="780" y="44" width="300" height="312" rx="16" fill="white"
        stroke="#e8e6e2" stroke-width="1" filter="url(#shadow)"/>

  <!-- Score card header -->
  <text x="800" y="78" font-family="'SF Mono', monospace"
        font-size="10" fill="#a8a7a3" letter-spacing="0.08em">OVERALL SCORE</text>

  <!-- Big score number -->
  <text x="800" y="138" font-family="'SF Pro Display', -apple-system, sans-serif"
        font-size="72" font-weight="700" fill="#111110" letter-spacing="-3">55</text>
  <text x="874" y="138" font-family="'SF Pro Display', sans-serif"
        font-size="36" font-weight="500" fill="#d97706">C</text>

  <!-- Score bar -->
  <rect x="800" y="150" width="240" height="5" rx="2.5" fill="#f5f4f2"/>
  <rect x="800" y="150" width="132" height="5" rx="2.5" fill="url(#scoreGrad)"/>

  <!-- Sub-scores -->
  <text x="800" y="172" font-family="'SF Mono', monospace" font-size="9"
        fill="#a8a7a3">Images</text>
  <text x="848" y="172" font-family="'SF Mono', monospace" font-size="9"
        fill="#a8a7a3">Reviews</text>
  <text x="900" y="172" font-family="'SF Mono', monospace" font-size="9"
        fill="#a8a7a3">AI Search</text>
  <text x="962" y="172" font-family="'SF Mono', monospace" font-size="9"
        fill="#a8a7a3">Bench.</text>

  <!-- Divider -->
  <line x1="800" y1="182" x2="1060" y2="182" stroke="#e8e6e2" stroke-width="0.5"/>

  <!-- Biggest leak label -->
  <text x="800" y="200" font-family="'SF Mono', monospace" font-size="10"
        fill="#a8a7a3" letter-spacing="0.06em">BIGGEST LEAK</text>

  <!-- Leak finding -->
  <rect x="800" y="208" width="240" height="48" rx="8" fill="#fafaf9" stroke="#e8e6e2" stroke-width="0.5"/>
  <circle cx="816" cy="224" r="3" fill="#dc2626"/>
  <text x="828" y="228" font-family="'SF Pro Display', sans-serif"
        font-size="11" font-weight="500" fill="#111110">Hero image — 11 words</text>
  <text x="828" y="242" font-family="'SF Pro Display', sans-serif"
        font-size="10" fill="#6b6a67">unreadable on mobile at 375px</text>
  <circle cx="816" cy="248" r="3" fill="#d97706"/>
  <text x="828" y="252" font-family="'SF Pro Display', sans-serif"
        font-size="10" fill="#6b6a67">No lifestyle context — competitor leads</text>

  <!-- Divider -->
  <line x1="800" y1="265" x2="1060" y2="265" stroke="#e8e6e2" stroke-width="0.5"/>

  <!-- Brief label -->
  <text x="800" y="284" font-family="'SF Mono', monospace" font-size="10"
        fill="#a8a7a3" letter-spacing="0.06em">PIXII BRIEF</text>

  <!-- Brief fields preview -->
  <text x="800" y="302" font-family="'SF Pro Display', sans-serif"
        font-size="10" fill="#a8a7a3">TARGET CUSTOMER</text>
  <text x="800" y="316" font-family="'SF Pro Display', sans-serif"
        font-size="11" fill="#111110">Adults 40–60, sleep concerns, Prime buyer</text>

  <text x="800" y="332" font-family="'SF Pro Display', sans-serif"
        font-size="10" fill="#a8a7a3">VISUAL DIRECTION</text>
  <text x="800" y="346" font-family="'SF Pro Display', sans-serif"
        font-size="11" fill="#111110">Transformation — sleep timeline framing</text>

  <!-- Open Pixii CTA -->
  <rect x="800" y="356" width="240" height="28" rx="7" fill="#111110"/>
  <text x="920" y="374" font-family="'SF Pro Display', sans-serif"
        font-size="12" font-weight="500" fill="white" text-anchor="middle">
    Get this fixed on Pixii →
  </text>

  <!-- ── BOTTOM STRIP ─────────────────────────────────────────── -->
  <line x1="0" y1="388" x2="1200" y2="388" stroke="#e8e6e2" stroke-width="0.5"/>

  <!-- Tech stack pills -->
  <rect x="120" y="369" width="68" height="18" rx="9" fill="#f5f4f2" stroke="#e8e6e2" stroke-width="0.5"/>
  <text x="154" y="381" font-family="'SF Mono', monospace" font-size="9"
        fill="#6b6a67" text-anchor="middle">Next.js 15</text>

  <rect x="196" y="369" width="76" height="18" rx="9" fill="#f5f4f2" stroke="#e8e6e2" stroke-width="0.5"/>
  <text x="234" y="381" font-family="'SF Mono', monospace" font-size="9"
        fill="#6b6a67" text-anchor="middle">Claude Vision</text>

  <rect x="280" y="369" width="58" height="18" rx="9" fill="#f5f4f2" stroke="#e8e6e2" stroke-width="0.5"/>
  <text x="309" y="381" font-family="'SF Mono', monospace" font-size="9"
        fill="#6b6a67" text-anchor="middle">SerpAPI</text>

  <rect x="346" y="369" width="62" height="18" rx="9" fill="#f5f4f2" stroke="#e8e6e2" stroke-width="0.5"/>
  <text x="377" y="381" font-family="'SF Mono', monospace" font-size="9"
        fill="#6b6a67" text-anchor="middle">Upstash</text>

  <rect x="416" y="369" width="56" height="18" rx="9" fill="#f5f4f2" stroke="#e8e6e2" stroke-width="0.5"/>
  <text x="444" y="381" font-family="'SF Mono', monospace" font-size="9"
        fill="#6b6a67" text-anchor="middle">Vercel</text>

  <rect x="480" y="369" width="52" height="18" rx="9" fill="#f5f4f2" stroke="#e8e6e2" stroke-width="0.5"/>
  <text x="506" y="381" font-family="'SF Mono', monospace" font-size="9"
        fill="#6b6a67" text-anchor="middle">Gemini</text>

  <!-- Right-aligned label -->
  <text x="1080" y="381" font-family="'SF Mono', monospace" font-size="9"
        fill="#a8a7a3" text-anchor="middle">Built for Pixii.ai · 2026</text>

</svg>
